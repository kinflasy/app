spring:
  config:
    import:
    - optional:file:../.env[.properties]

  # Configurações do DataSource
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  # Configurações do Hibernate (opcional)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true

  cloud:
    openfeign:
      client:
        config:
          address-api:
            url: ${ADDRESS_API_URL}
          people-api:
            url: ${PEOPLE_API_URL}
          inactive-people-api:
            url: ${INACTIVE_PEOPLE_API_URL}
          users-api:
            url: ${USERS_API_URL}
          people-filter-api:
            url: ${PEOPLE_FILTER_API_URL}

  # Configurações do DevTools
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  use-fqn: true

api:
  security:
    token:
      secret: ${JWT_SECRET:my-secret-key}
