spring:
  config:
    import:
    - file:../.env[.properties]

  # Configurações do DataSource
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

  # Configurações do Hibernate (opcional)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      "[hibernate.format_sql]": true

  cloud:
    openfeign:
      oauth2:
        enabled: true
      client:
        config:
          execution-usersApi:
            url: ${USERS_API_URL}
          auth-usersApi:
            url: ${USERS_API_URL}
          churches-addressesApi:
            url: ${ADDRESS_API_URL}
          churches-peopleApi:
            url: ${PEOPLE_API_URL}
          churches-inactivePeopleApi:
            url: ${INACTIVE_PEOPLE_API_URL}
          churches-usersApi:
            url: ${USERS_API_URL}
          churches-peopleFilterApi:
            url: ${PEOPLE_FILTER_API_URL}
          people-addressesApi:
            url: ${ADDRESS_API_URL}
          peopleFilters-churchesApi:
            url: ${CHURCHES_API_URL}
          peopleFilters-churchBaseApi-units:
            url: ${CHURCH_BASE_API_URL}
          peopleFilters-churchBaseApi-memberships:
            url: ${CHURCH_BASE_API_URL}
          peopleFilters-churchBaseApi-departments:
            url: ${CHURCH_BASE_API_URL}

  # Configurações do DevTools
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: false

logging:
  level:
    '[br.org.kinflasy.clients.UserClient]': DEBUG

springdoc:
  api-docs:
    path: /api-docs
  use-fqn: true

openfga:
  api-url: https://openfga:8090
  store-id: YOUR_FGA_STORE_ID
  authorization-model-id: YOUR_FGA_AUTHORIZATION_MODEL_ID

api:
  security:
    token:
      secret: ${JWT_SECRET:my-secret-key}
