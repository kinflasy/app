version: '3.7'

services:
  # Serviço para a aplicação Spring Boot
  web-service:
    container_name: web
    hostname: ${APP_NAME}-web
    build:
      context: ./
      dockerfile: Dockerfile
    image: ${APP_NAME}-web
    ports:
      - "8080:8080"
    environment:
      - APP_NAME=${APP_NAME}
      - APP_VERSION=${APP_VERSION}
      - JAR_FILE=target/${APP_NAME}.jar
      - DATABASE_URL=jdbc:mariadb://mariadb-service:3306/${DB_DATABASE}
      - DATABASE_USERNAME=${DB_USERNAME}
      - DATABASE_PASSWORD=${DB_PASSWORD}
      - GIT_USER=${GIT_USER}
      - GIT_EMAIL=${GIT_EMAIL}
    volumes:
      - .:/home/dev/web
    tty: true
    depends_on:
      - mariadb-service
    networks:
      - spring-boot-mysql-network

  # Serviço para o MariaDB
  mariadb-service:
    container_name: db
    image: mariadb:11.5.2
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - spring-boot-mysql-network

networks:
  spring-boot-mysql-network:
    driver: bridge

volumes:
  mariadb-data:
