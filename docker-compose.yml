networks:
  openfga:
  app:

volumes:
  minio_data:

services:
  # Serviço para o PostgreSQL
  db:
    image: postgres:17.5-alpine3.21
    container_name: db
    restart: always
    ports:
      - "${DATABASE_PORT}:${DATABASE_PORT}"
    expose:
      - ${DATABASE_PORT}
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app

  # Serviço para o PostgreSQL do OpenFGA
  openfga-db:
    image: postgres:17.5-alpine3.21
    container_name: openfga-db
    restart: always
    ports:
      - "${OPENFGA_DATABASE_PORT}:5432"
    expose:
      - ${OPENFGA_DATABASE_PORT}
    environment:
      POSTGRES_USER: ${OPENFGA_DATABASE_USER}
      POSTGRES_PASSWORD: ${OPENFGA_DATABASE_PASSWORD}
      POSTGRES_DB: ${OPENFGA_DATABASE_NAME}
    networks:
      - openfga
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${OPENFGA_DATABASE_USER} -d ${OPENFGA_DATABASE_NAME}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Serviço para a migração do OpenFGA
  migrate:
    depends_on:
      openfga-db:
        condition: service_healthy
    image: openfga/openfga:latest
    container_name: migrate
    command: migrate
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://${OPENFGA_DATABASE_USER}:${OPENFGA_DATABASE_PASSWORD}@openfga-db:${DATABASE_PORT}/${OPENFGA_DATABASE_NAME}?sslmode=disable
    networks:
      - openfga

  # Serviço para o servidor do OpenFGA
  openfga:
    depends_on:
      migrate:
        condition: service_completed_successfully
    image: openfga/openfga:latest
    container_name: openfga
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${OPENFGA_DATABASE_USER}:${OPENFGA_DATABASE_PASSWORD}@openfga-db:5432/${OPENFGA_DATABASE_NAME}?sslmode=disable
      OPENFGA_LOG_FORMAT: json
      OPENFGA_HTTP_ADDR: 0.0.0.0:${OPENFGA_HTTP_PORT}
      OPENFGA_HTTP_CORS_ALLOWED_ORIGINS:
      OPENFGA_AUTHN_METHOD: preshared
      OPENFGA_AUTHN_PRESHARED_KEYS: ${OPENFGA_API_TOKEN}
    command: run
    networks:
      - openfga
    ports:
      # Needed for the http server
      - "${OPENFGA_HTTP_PORT}:${OPENFGA_HTTP_PORT}"
      # Needed for the grpc server (if used)
      - "8081:8081"
      # Needed for the playground (Do not enable in prod!)
      - "3000:3000"

  # Serviço para MinIO (Armazenamento de Objetos S3-compatível)
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    networks:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serviço para a aplicação Spring Boot
  app:
    build: .
    container_name: app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      openfga:
        condition: service_started
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      OPENFGA_HTTP_URL: http://openfga:${OPENFGA_HTTP_PORT}
      OPENFGA_MODEL_FILE: model.json
      FGA_ENV_FILE: /shared/.env.fga
      STORAGE_PROVIDER: minio
      MINIO_URL: http://minio:9000
      MINIO_BUCKET: kinflasy
    networks:
      - app
      - openfga
